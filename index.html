<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZBRO$</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="RZBRO$">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RZBRO$">
    <meta name="theme-color" content="#0275d8">
    <link rel="icon" type="image/png" href="icons/icon-192x192.png?v=4">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png?v=4">
    <link rel="manifest" href="manifest.json?v=4">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100">
    <!-- Pantalla de Inicio / Selección de Usuario -->
    <div id="user-selection" class="fixed inset-0 z-50 bg-slate-900 flex flex-col items-center justify-center p-6">
        <h1 class="text-4xl font-black text-white mb-8 tracking-tighter italic">RZBRO$</h1>
        <p class="text-blue-400 font-bold mb-6 uppercase tracking-widest text-sm">Selecciona tu perfil</p>
        <div class="grid grid-cols-2 gap-4 w-full max-w-md">
            <button onclick="selectUser('Fabio')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Fabio</button>
            <button onclick="selectUser('Juan Carlos')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Juan Carlos</button>
            <button onclick="selectUser('Ronald')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Ronald</button>
            <button onclick="selectUser('Luis')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Luis</button>
        </div>
    </div>

    <!-- Modal de PIN -->
    <div id="pin-modal" class="fixed inset-0 z-[60] bg-black/90 hidden flex flex-col items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-xs text-center">
            <h3 id="pin-title" class="text-xl font-bold mb-4 text-white">Hola, </h3>
            <p id="pin-subtitle" class="text-sm text-slate-400 mb-4 font-medium uppercase tracking-wider"></p>
            <input type="password" id="pin-input" inputmode="numeric" maxlength="2" placeholder="••" class="bg-transparent text-white text-4xl text-center w-24 p-2 border-b-4 border-blue-500 outline-none mb-6">
            <button onclick="cancelLogin()" class="mt-4 text-gray-500 text-sm underline">Regresar</button>
        </div>
    </div>

    <header class="bg-slate-900/50 backdrop-blur-md sticky top-0 z-40 border-b border-slate-800 text-white p-4 flex justify-between items-center">
        <h1 class="text-2xl font-black tracking-tighter italic text-blue-500">RZBRO$</h1>
        <div class="flex gap-2">
            <button id="export-pdf-btn" class="bg-red-600 text-white px-4 py-1.5 rounded-full text-xs font-bold hover:bg-red-700 transition-colors uppercase">PDF</button>
            <button onclick="logout()" class="bg-slate-800 px-4 py-1.5 rounded-full text-xs font-bold border border-slate-700 hover:bg-red-500/10 hover:text-red-500 hover:border-red-500/50 transition-all">SALIR</button>
        </div>
    </header>

    <!-- Panel de Resumen y Búsqueda -->
    <div class="container mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-gradient-to-br from-blue-700 to-indigo-900 text-white p-6 rounded-2xl shadow-xl flex flex-col justify-center border border-blue-400/20">
            <h2 class="text-lg font-medium opacity-90 text-blue-100">Total por Cobrar</h2>
            <p id="total-amount" class="text-4xl font-black">$ 0.00</p>
        </div>
        <div class="bg-gradient-to-br from-red-700 to-rose-900 text-white p-6 rounded-2xl shadow-xl flex flex-col justify-center border border-red-400/20">
            <h2 class="text-lg font-medium opacity-90 text-rose-100">Total por Pagar</h2>
            <p id="total-to-pay" class="text-4xl font-black">$ 0.00</p>
        </div>
    </div>

    <main class="container mx-auto p-4">
        <!-- Formulario para agregar préstamos -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg mb-6">
            <h2 class="text-xl font-bold mb-4 text-white">Nuevo Préstamo</h2>
            <form id="loan-form">
                <input type="hidden" id="loan-id">
                <div class="mb-4">
                    <label for="client-name" class="block text-slate-400 text-sm font-medium mb-1">Nombre del Cliente</label>
                    <input type="text" id="client-name" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:border-blue-500 outline-none transition-all" required>
                </div>
                <div class="mb-4">
                    <label for="loan-amount" class="block text-slate-400 text-sm font-medium mb-1">Monto ($)</label>
                    <input type="number" id="loan-amount" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:border-blue-500 outline-none transition-all" required>
                </div>
                <div class="mb-4">
                    <label for="loan-interest" class="block text-slate-400 text-sm font-medium mb-1">Interés (%)</label>
                    <input type="number" id="loan-interest" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:border-blue-500 outline-none transition-all" placeholder="0">
                </div>
                <div class="mb-4">
                    <label for="loan-date" class="block text-slate-400 text-sm font-medium mb-1">Fecha</label>
                    <input type="date" id="loan-date" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:border-blue-500 outline-none transition-all" required>
                </div>
                <div class="mb-4">
                    <label for="loan-details" class="block text-slate-400 text-sm font-medium mb-1">Detalles (Opcional)</label>
                    <textarea id="loan-details" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:border-blue-500 outline-none transition-all" rows="2"></textarea>
                </div>
                <div class="mb-4">
                    <label for="loan-receipt" class="block text-slate-400 text-sm font-medium mb-1">Comprobante</label>
                    <div class="flex items-center space-x-2">
                        <input type="file" id="loan-receipt" class="w-full p-2.5 bg-slate-800 border border-slate-700 rounded-xl text-xs text-slate-400" accept="image/*">
                        <button type="button" id="start-camera-btn" class="bg-indigo-600 text-white px-4 py-3 rounded-xl hover:bg-indigo-700 transition-colors text-sm font-bold">Cámara</button>
                    </div>
                </div>

                <!-- Contenedor de la cámara -->
                <div id="camera-container" class="mb-4 hidden">
                    <video id="camera-stream" class="w-full border border-slate-700 rounded-xl mb-2"></video>
                    <button type="button" id="capture-btn" class="w-full bg-emerald-600 text-white p-3 rounded-xl font-bold hover:bg-emerald-700">Capturar</button>
                    <button type="button" id="cancel-camera-btn" class="w-full bg-slate-800 text-white p-3 rounded-xl mt-2 border border-slate-700">Cancelar</button>
                </div>
                <canvas id="canvas" class="hidden"></canvas>
                <button type="submit" id="save-btn" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-500 shadow-lg shadow-blue-900/20 transition-all">Guardar Préstamo</button>
                <button type="button" id="cancel-edit-btn" class="w-full bg-gray-500 text-white p-2 rounded hover:bg-gray-600 mt-2 hidden">Cancelar Edición</button>
            </form>
        </div>

        <!-- Lista de préstamos -->
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg">
            <h2 class="text-xl font-bold mb-4 text-white">Préstamos Activos</h2>
            <div id="loans-list" class="space-y-4">
                <div class="flex justify-center items-center p-8">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                    <span class="ml-2 text-slate-500 font-medium">Cargando préstamos...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Notificación Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 transition-transform duration-300 hidden">
        ¡Operación exitosa!
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="app.js?v=35"></script>
</body>
</html>
