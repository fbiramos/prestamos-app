<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZBRO$</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="RZBRO$">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RZBRO$">
    <meta name="theme-color" content="#0275d8">
    <link rel="icon" type="image/png" href="icons/icon-192x192.png?v=4">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png?v=4">
    <link rel="manifest" href="manifest.json?v=4">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100">
    <!-- Pantalla de Inicio / Selección de Usuario -->
    <div id="user-selection" class="fixed inset-0 z-50 bg-slate-900 flex flex-col items-center justify-center p-6">
        <h1 class="text-4xl font-black text-white mb-8 tracking-tighter italic">RZBRO$</h1>
        <p class="text-blue-400 font-bold mb-6 uppercase tracking-widest text-sm">Selecciona tu perfil</p>
        <div class="grid grid-cols-2 gap-4 w-full max-w-md">
            <button onclick="selectUser('Fabio')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Fabio</button>
            <button onclick="selectUser('Juan Carlos')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Juan Carlos</button>
            <button onclick="selectUser('Ronald')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Ronald</button>
            <button onclick="selectUser('Luis')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Luis</button>
        </div>
    </div>

    <!-- Modal de PIN -->
    <div id="pin-modal" class="fixed inset-0 z-[60] bg-black/90 hidden flex flex-col items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl w-full max-w-xs text-center">
            <h3 id="pin-title" class="text-xl font-bold mb-4 text-white">Hola, </h3>
            <p id="pin-subtitle" class="text-sm text-slate-400 mb-4 font-medium uppercase tracking-wider"></p>
            <div class="flex items-center justify-center gap-3 mb-6">
                <input type="password" id="pin-input" inputmode="numeric" maxlength="2" placeholder="••" class="bg-transparent text-white text-4xl text-center w-20 p-2 border-b-4 border-blue-500 outline-none">
                <button onclick="submitPin()" class="bg-blue-600 text-white w-12 h-12 rounded-xl flex items-center justify-center text-xs font-black shadow-lg shadow-blue-900/40 active:scale-90 transition-all">
                    OK
                </button>
            </div>
            <button onclick="cancelLogin()" class="mt-4 text-gray-500 text-sm underline">Regresar</button>
        </div>
    </div>

    <header class="bg-slate-900/50 backdrop-blur-md sticky top-0 z-40 border-b border-slate-800 text-white p-4 flex justify-between items-center">
        <h1 class="text-2xl font-black tracking-tighter italic text-blue-500">RZBRO$</h1>
        <div class="flex gap-2">
            <button id="export-pdf-btn" class="bg-red-600 text-white px-4 py-1.5 rounded-full text-xs font-bold hover:bg-red-700 transition-colors uppercase">PDF</button>
            <button onclick="logout()" class="bg-slate-800 px-4 py-1.5 rounded-full text-xs font-bold border border-slate-700 hover:bg-red-500/10 hover:text-red-500 hover:border-red-500/50 transition-all">SALIR</button>
        </div>
    </header>

    <!-- Vista Principal (Dashboard) -->
    <div id="dashboard-view">
        <!-- Panel de Resumen -->
        <div class="container mx-auto p-4 grid grid-cols-2 gap-3 sm:gap-4">
            <div class="bg-gradient-to-br from-blue-700 to-indigo-900 text-white p-4 sm:p-6 rounded-2xl shadow-xl flex flex-col justify-center border border-blue-400/20">
                <h2 class="text-[13px] sm:text-2xl font-medium opacity-90 text-blue-100 uppercase tracking-wider">Total por Cobrar</h2>
                <p id="total-amount" class="text-2xl sm:text-5xl font-black leading-tight">$ 0.00</p>
            </div>
            <div class="bg-gradient-to-br from-red-700 to-rose-900 text-white p-4 sm:p-6 rounded-2xl shadow-xl flex flex-col justify-center border border-red-400/20">
                <h2 class="text-[13px] sm:text-2xl font-medium opacity-90 text-rose-100 uppercase tracking-wider">Total por Pagar</h2>
                <p id="total-to-pay" class="text-2xl sm:text-5xl font-black leading-tight">$ 0.00</p>
            </div>
        </div>

        <!-- Estado de Préstamos -->
        <div class="container mx-auto p-4">
            <h2 class="text-xl font-bold mb-4 text-white">Estado de Préstamos</h2>
            <div id="brothers-status-container" class="grid grid-cols-3 gap-2 sm:gap-4 mb-6"></div>
            <div id="active-loans-list" class="space-y-4"></div>
        </div>

        <div class="container mx-auto p-4">
            <button id="toggle-form-btn" class="w-full bg-blue-600 text-white p-4 font-bold flex items-center justify-center gap-2 active:scale-95 transition-all">
                <span class="text-2xl">➕</span> NUEVO PRÉSTAMO
            </button>
        </div>
        
        <!-- Acceso discreto a Préstamos Externos -->
        <button id="open-external-btn" class="fixed bottom-8 left-6 z-30 bg-slate-900 text-blue-400 px-5 py-4 rounded-2xl border-2 border-blue-500/50 shadow-2xl shadow-blue-900/40 font-black uppercase tracking-widest hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
            <span class="text-xl">📋</span> <span class="text-xs">OTROS PRESTAMOS</span>
        </button>

    </div>

    <!-- Vista de Formulario (Nueva Página) -->
    <div id="form-view" class="container mx-auto p-4 hidden">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg min-h-[80vh]">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="goBack()" class="text-blue-500 text-3xl">←</button>
                <h2 class="text-2xl font-bold text-white">Datos del Préstamo</h2>
            </div>
            
            <!-- Selección rápida de hermanos -->
            <div id="form-brothers-container" class="grid grid-cols-3 gap-2 mb-6"></div>

            <form id="loan-form">
                <input type="hidden" id="loan-id">
                <input type="hidden" id="client-name">
                <div class="mb-4">
                    <label class="block text-slate-400 text-sm font-medium mb-1">Monto ($)</label>
                    <input type="number" id="loan-amount" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:border-blue-500 outline-none transition-all" required>
                </div>
                <div class="mb-4">
                    <label class="block text-slate-400 text-sm font-medium mb-1">Detalles (Opcional)</label>
                    <textarea id="loan-details" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:border-blue-500 outline-none transition-all" rows="2"></textarea>
                </div>
                <button type="submit" id="save-btn" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-500 shadow-lg shadow-blue-900/20 transition-all">Guardar Préstamo</button>
                <button type="button" id="cancel-edit-btn" class="w-full bg-gray-500 text-white p-2 rounded hover:bg-gray-600 mt-2 hidden">Cancelar Edición</button>
            </form>
        </div>
    </div>

    <!-- Vista de Detalle por Hermano (Nueva Página) -->
    <div id="brother-detail-view" class="container mx-auto p-4 hidden">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg min-h-[80vh]">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="goBack()" class="text-blue-500 text-3xl">←</button>
                <h2 id="brother-detail-title" class="text-2xl font-bold text-white uppercase tracking-tighter italic">Estado con ...</h2>
            </div>

            <!-- Contenedor principal para el resumen y balance -->
            <div id="brother-loans-list" class="mb-6"></div>
        </div>
    </div>

    <!-- Vista de Gestión de Préstamo Individual -->
    <div id="loan-manage-view" class="container mx-auto p-4 hidden">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg min-h-[80vh]">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="goBack()" class="text-blue-500 text-3xl">←</button>
                <h2 class="text-2xl font-bold text-white uppercase tracking-tighter italic">Gestionar Préstamo</h2>
            </div>
            <div id="single-loan-manage-container" class="space-y-6">
                <!-- Tarjeta de administración única -->
            </div>
        </div>
    </div>

    <!-- Vista de Préstamos Externos -->
    <div id="external-loans-view" class="container mx-auto p-4 hidden">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg min-h-[80vh]">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="goBack()" class="text-blue-500 text-3xl">←</button>
                <h2 class="text-2xl font-bold text-white uppercase tracking-tighter italic">Préstamos Externos</h2>
            </div>

            <!-- Formulario Externo -->
            <form id="external-loan-form" class="mb-8 p-4 border border-slate-800 rounded-xl bg-slate-950/50">
                <h3 class="text-xs font-bold text-blue-500 uppercase tracking-widest mb-4">Registrar Nuevo</h3>
                <div class="space-y-4">
                    <input type="text" id="ext-debtor" placeholder="¿Quién debe?" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none" required>
                    <input type="text" id="ext-reason" placeholder="¿Por qué la deuda?" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="ext-amount" placeholder="Monto ($)" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none" required>
                        <input type="date" id="ext-due-date" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold uppercase text-xs tracking-widest">Añadir a mi lista</button>
                </div>
            </form>

            <div id="external-loans-list" class="space-y-4">
                <!-- Lista de préstamos personales -->
            </div>
        </div>
    </div>

    <!-- Notificación Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 transition-transform duration-300 hidden">
        ¡Operación exitosa!
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-messaging-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="app.js?v=98"></script>
</body>
</html>
