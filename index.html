<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RZBRO$</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="RZBRO$">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RZBRO$">
    <meta name="theme-color" content="#0275d8">
    <link rel="icon" type="image/png" href="icons/icon-192x192.png?v=4">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png?v=4">
    <link rel="manifest" href="manifest.json?v=4">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 text-slate-900">
    <!-- Pantalla de Inicio / Selección de Usuario -->
    <div id="user-selection" class="fixed inset-0 z-50 bg-slate-900 flex flex-col items-center justify-center p-6">
        <h1 class="text-4xl font-black text-white mb-8 tracking-tighter italic">RZBRO$</h1>
        <p class="text-blue-400 font-bold mb-6 uppercase tracking-widest text-sm">Selecciona tu perfil</p>
        <div class="grid grid-cols-2 gap-4 w-full max-w-md">
            <button onclick="selectUser('Fabio')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Fabio</button>
            <button onclick="selectUser('Juan Carlos')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Juan Carlos</button>
            <button onclick="selectUser('Ronald')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Ronald</button>
            <button onclick="selectUser('Luis')" class="bg-slate-800 text-white p-6 rounded-2xl border-2 border-slate-700 hover:border-blue-500 transition-all font-bold text-lg">Luis</button>
        </div>
    </div>

    <!-- Modal de PIN -->
    <div id="pin-modal" class="fixed inset-0 z-[60] bg-black/90 hidden flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-xs text-center">
            <h3 id="pin-title" class="text-xl font-bold mb-4">Hola, </h3>
            <p id="pin-subtitle" class="text-sm text-gray-600 mb-4 font-medium uppercase tracking-wider"></p>
            <input type="password" id="pin-input" inputmode="numeric" maxlength="2" placeholder="••" class="text-4xl text-center w-24 p-2 border-b-4 border-blue-500 outline-none mb-6">
            <button id="biometric-btn" class="hidden w-full mb-4 bg-slate-100 p-3 rounded-lg text-sm font-semibold flex items-center justify-center gap-2">
                <span class="text-xl">🛡️</span> Usar Biometría
            </button>
            <button id="verify-pin-btn" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Entrar</button>
            <button onclick="cancelLogin()" class="mt-4 text-gray-500 text-sm underline">Regresar</button>
        </div>
    </div>

    <header class="bg-blue-500 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">RZBRO$</h1>
        <button onclick="logout()" class="bg-blue-600 px-3 py-1 rounded text-xs font-bold border border-blue-400">SALIR</button>
    </header>

    <!-- Panel de Resumen y Búsqueda -->
    <div class="container mx-auto p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-gradient-to-r from-blue-600 to-blue-400 text-white p-6 rounded-xl shadow-lg flex flex-col justify-center">
            <h2 class="text-lg font-medium opacity-90">Total por Cobrar</h2>
            <p id="total-amount" class="text-4xl font-black">$ 0.00</p>
        </div>
        
        <div class="bg-slate-50 p-6 rounded-xl shadow-lg flex flex-col justify-center border-l-4 border-blue-500">
            <div class="flex justify-between items-center mb-2">
                <label for="search-input" class="text-gray-700 font-bold uppercase text-xs tracking-wider">Buscar Cliente</label>
                <button id="export-pdf-btn" class="bg-red-600 text-white px-3 py-1 rounded text-xs font-bold hover:bg-red-700 transition-colors uppercase">PDF</button>
            </div>
            <input type="text" id="search-input" placeholder="Nombre del cliente..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none transition-all">
        </div>
    </div>

    <main class="container mx-auto p-4">
        <!-- Formulario para agregar préstamos -->
        <div class="bg-slate-50 p-6 rounded-lg shadow-lg mb-6">
            <h2 class="text-xl font-semibold mb-4">Agregar Nuevo Préstamo</h2>
            <form id="loan-form">
                <input type="hidden" id="loan-id">
                <div class="mb-4">
                    <label for="client-name" class="block text-gray-700">Nombre</label>
                    <input type="text" id="client-name" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label for="loan-amount" class="block text-gray-700">Monto del Préstamo</label>
                    <input type="number" id="loan-amount" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label for="loan-date" class="block text-gray-700">Fecha del Préstamo</label>
                    <input type="date" id="loan-date" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label for="loan-details" class="block text-gray-700">Detalles (Opcional)</label>
                    <textarea id="loan-details" class="w-full p-2 border rounded" rows="3"></textarea>
                </div>
                <div class="mb-4">
                    <label for="loan-receipt" class="block text-gray-700">Foto de Comprobante (Opcional)</label>
                    <div class="flex items-center space-x-2">
                        <input type="file" id="loan-receipt" class="w-full p-2 border rounded" accept="image/*">
                        <button type="button" id="start-camera-btn" class="bg-indigo-500 text-white px-4 py-2 rounded hover:bg-indigo-600">Tomar Foto</button>
                    </div>
                </div>

                <!-- Contenedor de la cámara -->
                <div id="camera-container" class="mb-4 hidden">
                    <video id="camera-stream" class="w-full border rounded mb-2"></video>
                    <button type="button" id="capture-btn" class="w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">Capturar Foto</button>
                    <button type="button" id="cancel-camera-btn" class="w-full bg-red-500 text-white p-2 rounded hover:bg-red-600 mt-2">Cancelar</button>
                </div>
                <canvas id="canvas" class="hidden"></canvas>
                <button type="submit" id="save-btn" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Guardar Préstamo</button>
                <button type="button" id="cancel-edit-btn" class="w-full bg-gray-500 text-white p-2 rounded hover:bg-gray-600 mt-2 hidden">Cancelar Edición</button>
            </form>
        </div>

        <!-- Lista de préstamos -->
        <div class="bg-slate-50 p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Préstamos Activos</h2>
            <div id="loans-list" class="space-y-4">
                <div class="flex justify-center items-center p-8">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                    <span class="ml-2 text-gray-500">Cargando préstamos...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Notificación Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 transition-transform duration-300 hidden">
        ¡Operación exitosa!
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
